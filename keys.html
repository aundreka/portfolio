<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clay Icon Keys — Night Sky</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    #stars-canvas { position:fixed; inset:0; z-index:0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      background: #070a16;
      font-family: 'Nunito', sans-serif;
    }

    .nebula {
      position:fixed; border-radius:50%;
      filter:blur(90px); pointer-events:none;
      z-index:1; mix-blend-mode:screen;
    }
    .neb-1 { width:500px;height:500px;background:rgba(80,20,140,.5);   top:-120px;right:-100px; }
    .neb-2 { width:400px;height:400px;background:rgba(10,60,160,.4);   bottom:-80px;left:-80px; }
    .neb-3 { width:280px;height:280px;background:rgba(180,30,100,.3);  top:38%;left:22%; }
    .neb-4 { width:220px;height:220px;background:rgba(20,130,160,.28); bottom:20%;right:18%; }

    h1 {
      position:relative; z-index:2;
      font-size:.8rem; letter-spacing:.22em;
      text-transform:uppercase; color:rgba(200,210,255,.4);
    }

    .keyboard-row {
      position:relative; z-index:2;
      display:flex; gap:16px; align-items:flex-end;
    }

    /* ── KEY ── */
    .key {
      position:relative;
      display:inline-flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      --accent: #6688cc;
      --accent-rgb: 102,136,204;
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s ease;
    }

    /* clay depth body — dark + brand tint */
    .key::before {
      content:'';
      position:absolute; inset:0; border-radius:inherit;
      background: color-mix(in srgb, var(--accent) 30%, #0d1025);
      transform: translateY(6px);
      box-shadow:
        0 8px 0 color-mix(in srgb, var(--accent) 45%, #000),
        0 14px 30px rgba(0,0,0,.85),
        0 0 22px color-mix(in srgb, var(--accent) 30%, transparent);
      transition: transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .12s ease;
    }

    /* key face — dark translucent tinted with brand color */
    .key-face {
      position:relative; z-index:1;
      width:100%; height:100%; border-radius:inherit;
      /* deep translucent brand tint — dark base + brand at ~22% */
      background:
        linear-gradient(
          145deg,
          color-mix(in srgb, var(--accent) 28%, #111520) 0%,
          color-mix(in srgb, var(--accent) 16%, #0a0e1c) 100%
        );
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px; padding:10px 12px;
      /* top gloss streak — thin, bright brand-tinted rim */
      box-shadow:
        inset 0 2px 0 color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,.7)),
        inset 0 -2px 0 rgba(0,0,0,.5),
        inset 1px 0 0 color-mix(in srgb, var(--accent) 20%, rgba(255,255,255,.08)),
        0 0 18px color-mix(in srgb, var(--accent) 22%, transparent);
      /* subtle inner glass grain */
      backdrop-filter: blur(2px);
    }

    /* sizes */
    .key-sq   { width:74px;  height:74px;  border-radius:18px; }
    .key-wide { width:116px; height:74px;  border-radius:18px; }
    .key-bar  { width:230px; height:74px;  border-radius:20px; }

    /* icon */
    .key-icon {
      width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;
      filter:
        drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 80%, transparent))
        drop-shadow(0 2px 4px rgba(0,0,0,.6));
      transition: filter .12s ease, transform .12s ease;
    }
    .key-icon svg { width:100%; height:100%; display:block; }

    /* app name label */
    .key-name {
      font-size:.5rem; font-weight:800;
      letter-spacing:.07em; text-transform:uppercase;
      color: color-mix(in srgb, var(--accent) 70%, #fff);
      line-height:1;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    /* ── HOVER ── */
    .key:hover:not(:active) {
      transform: translateY(-5px);
      filter: drop-shadow(0 0 16px color-mix(in srgb, var(--accent) 70%, transparent));
    }
    .key:hover:not(:active)::before {
      transform: translateY(11px);
      box-shadow:
        0 11px 0 color-mix(in srgb, var(--accent) 50%, #000),
        0 22px 40px rgba(0,0,0,.9),
        0 0 38px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .key:hover .key-icon {
      transform: scale(1.12);
      filter:
        drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 100%, transparent))
        drop-shadow(0 0 4px rgba(255,255,255,.3));
    }

    /* ── PRESS ── */
    .key:active::before, .key.pressed::before {
      transform:translateY(2px);
      box-shadow:
        0 2px 0 color-mix(in srgb, var(--accent) 50%, #000),
        0 4px 14px rgba(0,0,0,.7);
    }
    .key:active, .key.pressed { transform:translateY(4px); }

    /* flash */
    .key-face::after {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background: radial-gradient(circle at 50% 38%,
        color-mix(in srgb, var(--accent) 50%, rgba(255,255,255,.6)) 0%,
        transparent 65%);
      opacity:0; transition:opacity .3s; pointer-events:none;
    }
    .key:active .key-face::after { opacity:1; }

    /* ── ENTRANCE ── */
    @keyframes popIn {
      0%  { opacity:0; transform:scale(.6) translateY(28px); }
      75% { transform:scale(1.08) translateY(-4px); }
      100%{ opacity:1; transform:scale(1) translateY(0); }
    }
    .key { animation:popIn .6s cubic-bezier(.34,1.56,.64,1) both; }
    .key:nth-child(1){ animation-delay:.05s; }
    .key:nth-child(2){ animation-delay:.13s; }
    .key:nth-child(3){ animation-delay:.21s; }
    .key:nth-child(4){ animation-delay:.29s; }
    .key:nth-child(5){ animation-delay:.37s; }
    .keyboard-row:nth-child(3) .key { animation-delay:.45s; }
    .keyboard-row:nth-child(4) .key { animation-delay:.53s; }
    .keyboard-row:nth-child(5) .key { animation-delay:.61s; }

    /* tooltip */
    .key[data-tip]:hover::after {
      content:attr(data-tip);
      position:absolute; bottom:calc(100% + 14px); left:50%;
      transform:translateX(-50%);
      background:rgba(8,10,22,.92);
      color: color-mix(in srgb, var(--accent) 80%, #fff);
      font-size:.58rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
      padding:5px 11px; border-radius:8px; white-space:nowrap;
      border:1px solid color-mix(in srgb, var(--accent) 40%, rgba(255,255,255,.1));
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 35%, transparent);
      backdrop-filter:blur(10px);
      z-index:10; pointer-events:none;
    }

    /* shooting star */
    .shoot {
      position:fixed; width:2px; height:2px; border-radius:50%;
      background:#fff; z-index:1; pointer-events:none; opacity:0;
    }
    @keyframes shoot {
      0%  { opacity:1; transform:translate(0,0) scaleX(1); }
      100%{ opacity:0; transform:translate(300px,170px) scaleX(90); }
    }
  </style>
</head>

    <div class="key-face" style="flex-direction:row;gap:10px;padding:0 18px;">

        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <path d="M256 48L496 464H16L256 48z" fill="#ffffff"/>
        </svg>
      </div>
      <span class="key-name" style="font-size:.65rem;">Vercel</span>
    </div>
  </div>

  <div class="key key-wide" style="--accent:#3ECF8E" data-tip="Supabase">
    <div class="key-face" style="flex-direction:row;gap:10px;padding:0 18px;">
      <div class="key-icon" style="width:30px;height:30px;">
        <svg viewBox="0 0 109 113" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sg1" x1="53%" y1="50%" x2="8%" y2="95%" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#249361"/>
              <stop offset="100%" stop-color="#3ECF8E"/>
            </linearGradient>
          </defs>
          <path d="M63.7 110.2c-2.8 3.5-8.7 1.5-8.8-2.9l-1-67.3H99c7.8 0 12.1 9 7.4 15.1L63.7 110.2z" fill="url(#sg1)"/>
          <path d="M45.3 2.1C48 -1.4 54 .5 54 5l.7 67.3H10c-7.8 0-12.1-9-7.4-15.1L45.3 2.1z" fill="#3ECF8E"/>
        </svg>
      </div>
      <span class="key-name" style="font-size:.65rem;">Supabase</span>
    </div>
  </div>

</div>

<!-- ROW 4 — Launcher bar -->
<div class="keyboard-row">
  <div class="key key-bar" style="--accent:#8b5cf6" data-tip="App Launcher">
    <div class="key-face" style="flex-direction:row;gap:14px;padding:0 28px;">
      <div class="key-icon" style="width:28px;height:28px;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4"  cy="4"  r="2.5" fill="#5865F2"/>
          <circle cx="12" cy="4"  r="2.5" fill="#FF4444"/>
          <circle cx="20" cy="4"  r="2.5" fill="#1DB954"/>
          <circle cx="4"  cy="12" r="2.5" fill="#ECB22E"/>
          <circle cx="12" cy="12" r="2.5" fill="#4285F4"/>
          <circle cx="20" cy="12" r="2.5" fill="#A259FF"/>
          <circle cx="4"  cy="20" r="2.5" fill="#FF7262"/>
          <circle cx="12" cy="20" r="2.5" fill="#2D8CFF"/>
          <circle cx="20" cy="20" r="2.5" fill="#3ECF8E"/>
        </svg>
      </div>
      <span class="key-name" style="font-size:.65rem;letter-spacing:.12em;">App Launcher</span>
    </div>
  </div>
</div>

<script>
  /* ── Starfield ── */
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', () => { resize(); buildStars(); });

  function buildStars() {
    stars = [];
    const n = Math.floor((canvas.width * canvas.height) / 2600);
    const palette = ['#ffffff','#cce0ff','#ffd8ff','#d8fff0','#ffe8cc'];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.2,
        base: Math.random() * 0.65 + 0.2,
        spd: Math.random() * 0.025 + 0.006,
        ph: Math.random() * Math.PI * 2,
        col: palette[Math.floor(Math.random() * palette.length)]
      });
    }
  }
  buildStars();

  let t = 0;
  (function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.016;
    stars.forEach(s => {
      const a = s.base * (0.55 + 0.45 * Math.sin(t * s.spd * 60 + s.ph));
      ctx.globalAlpha = a;
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
      if (s.r > 1.05) {
        ctx.globalAlpha = a * 0.4;
        ctx.strokeStyle = s.col;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x - s.r*3.5, s.y); ctx.lineTo(s.x + s.r*3.5, s.y);
        ctx.moveTo(s.x, s.y - s.r*3.5); ctx.lineTo(s.x, s.y + s.r*3.5);
        ctx.stroke();
      }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  })();

  /* ── Shooting stars ── */
  function shoot() {
    const el = document.createElement('div');
    el.className = 'shoot';
    el.style.top  = (Math.random() * 55) + '%';
    el.style.left = (Math.random() * 55) + '%';
    document.body.appendChild(el);
    el.style.animation = `shoot ${0.9 + Math.random() * 0.7}s linear forwards`;
    el.addEventListener('animationend', () => el.remove());
  }
  setTimeout(shoot, 900);
  setInterval(shoot, 3800);

  /* ── Key press ── */
  document.querySelectorAll('.key').forEach(k => {
    k.addEventListener('mousedown', () => k.classList.add('pressed'));
    k.addEventListener('mouseup',   () => k.classList.remove('pressed'));
    k.addEventListener('mouseleave',() => k.classList.remove('pressed'));
  });
</script>
</body>
</html>
